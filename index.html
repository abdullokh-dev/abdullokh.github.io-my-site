<style>

#menu button{

bottom:10px;
left:10px;

}

.glass{
background:rgba(255,255,255,0.08);
padding:30px;

<body>

<button onclick="openPage('draw')">Draw</button>

</div>

<!-- GAME -->

<canvas id="gameCanvas" width="400" height="400"></canvas>

<br>

<button onclick="startBall()">Ball</button>
<button onclick="startClick()">Click</button>

<button onclick="press(9)">9</button>
<button onclick="press('*')">*</button>

<br>

<button onclick="press(0)">0</button>
<button onclick="calc()">=</button>
<button onclick="press('.')">.</button>
<button onclick="press('/')">/</button>

</div>

</div>

<script>

/* menu */

function openPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

/* calculator */

function press(v){
display.value+=v
}

function calc(){
display.value=eval(display.value)
}

/* AI assistant */

function askAI(){

let q=aiInput.value.toLowerCase()

let a=""

if(q.includes("salom")) a="Salom!"

else if(q.includes("vaqt")) a=new Date().toLocaleTimeString()

else a="Men oddiy AI yordamchiman"

aiAnswer.innerText=a

}

/* Ramadan animation */

let rcanvas=document.getElementById("ramadanCanvas")
let rctx=rcanvas.getContext("2d")

let t=0

function ramadan(){

rctx.clearRect(0,0,800,400)

rctx.font="80px Poppins"

rctx.fillStyle="gold"

rctx.fillText("Ramadan",200+Math.sin(t)*20,200)

t+=0.05

requestAnimationFrame(ramadan)

}

ramadan()

/* game */

let gcanvas=document.getElementById("gameCanvas")
let gctx=gcanvas.getContext("2d")

function startBall(){

let ball={x:200,y:200,vx:3,vy:2}

function loop(){

gctx.clearRect(0,0,400,400)

gctx.beginPath()
gctx.arc(ball.x,ball.y,20,0,Math.PI*2)
gctx.fillStyle="gold"
gctx.fill()

ball.x+=ball.vx
ball.y+=ball.vy

if(ball.x<20||ball.x>380) ball.vx*=-1
if(ball.y<20||ball.y>380) ball.vy*=-1

requestAnimationFrame(loop)

}

loop()

}

function startSnake(){

gctx.fillStyle="lime"

gctx.fillRect(200,200,20,20)

}

function startClick(){

gcanvas.onclick=()=>{

gctx.fillStyle="red"

gctx.fillRect(Math.random()*380,Math.random()*380,20,20)

}

}

/* hand tracking */

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function onResults(results){

if(results.multiHandLandmarks){

for(const landmarks of results.multiHandLandmarks){

let x=landmarks[8].x*canvas.width
let y=landmarks[8].y*canvas.height

ctx.fillStyle="yellow"

ctx.beginPath()

ctx.arc(x,y,5,0,Math.PI*2)

ctx.fill()

}

}

}

const hands=new Hands({

locateFile:file=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}

})

hands.setOptions({

maxNumHands:1

})

hands.onResults(onResults)

const camera=new Camera(video,{

onFrame:async()=>{
await hands.send({image:video})
},

width:640,
height:480

})

camera.start()

</script>

</body>
